mode                      : rule                                                # 配置： 默认模式             # 规则模式 (rule)  /  全局翻墙 (global)  /  直连模式 (driect)

mixed-port: 7254                                              # 配置：代理服务端口           # 在同一个端口上，同时提供 HTTP(S) + SOCKS4/5
port: 7249                                               # 配置：代理服务端口           # 只提供 HTTP(S) 代理
socks-port: 7346                                              # 配置：代理服务端口           # 只提供 SOCKS 代理
#redir-port                : 7893                                                # 配置：代理服务端口           # Linux 和 macOS 的透明代理服务器端口（ReDIRECT TCP 和 TProxy UDP）
#tproxy-port               : 7894                                                # 配置：代理服务端口           # Linux 的透明代理服务器端口（TProxy TCP 和 TProxy UDP）

allow-lan: true

interface-name: XVSVT

etag-support: true

global-ua: clash.meta

ipv6: true

log-level: info

external-controller: :9090

# 启用一个内置或已下载的UI面板
#global-client-fingerprint: Firefox                                            # 全局客户端指纹 # 随机指纹     # 可选：chrome, firefox, safari, iOS, android, edge, 360, qq, random, 若选择 random, 则按 Cloudflare Radar 数据按概率生成一个现代浏览器指纹
#最新mihomo文档说明以弃用，需直接在proxies:配置

external-ui: dashboard  # 假设您已将 dashboard 文件夹放在正确的位置


unified-delay: true    # 策略组测速时，只保留一个测速结果，使切换更平滑 (推荐开启)

tcp-concurrent: true   # 开启 TCP 并发连接 (针对同一域名可建立多个连接，提升性能)

keep-alive-idle: 600   # TCP Keep-Alive 空闲时间 (秒)

keep-alive-interval: 15 # TCP Keep-Alive 探测间隔 (秒)

store-selected: true                                                # 储存 API 对策略组的选择，以供下次启动时使用
store-fake-ip: true                                                # 储存 fakeip 映射表，域名再次发生连接时，使用原有映射地址
geodata-loader: memconservative
geo-auto-update: true 
geo-update-interval: 24
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"


