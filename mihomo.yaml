sniffer                   :                                                     # 设置 ： 嗅探       Clash Meta (Clash Verge Rec) 专用规则
  enable                  : true                                                # 嗅探器开关 :  开启后对 redir-host 类型识别的流量进行强制嗅探      
  force-dns-mapping: true
  parse-pure-ip: true 
  override-destination    : true                                               # 是否使用嗅探结果作为实际访问,默认 true    ,全局配置,优先级低于 sniffer.sniff 实际配置 

  sniff                   :
    HTTP                  : { ports : [ 80  , 8080-8880 ]  }   # HTTP , 默认如果不配置 ports , 默认嗅探  80
    TLS                   : { ports : [ 443 , 8443      ]                                  }   # TLS , 默认如果不配置 ports , 默认嗅探 443
    QUIC                  : { ports : [ 443 , 8443      ]                                  }
  force-domain            : [ '+.v2ex.com'                                                 ]   # 需要强制嗅探的域名（默认情况下只对IP进行嗅探）
  skip-domain             :                                                     # 需要跳过嗅探的域名。主要解决部分站点sni字段非域名，导致嗅探结果异常的问题，如：米家设备
                            -  'Mijia Cloud' 
                            -  'dlg.io.mi.com'  
                            -  '+.apple.com'  
                            -  '+.icloud.com'  
                            -  '+.wechat.com'  
                            -  '+.qpic.cn'  
                            -  '+.qq.com'  
                            -  '+.wechatapp.com'  
                            -  '+.vivox.com'  
                            -  '+.oray.com'  
                            -  '+.sunlogin.net'     
  skip-dst-address:
    - 'rule-set:telegramcidr'
    - 'geoip:LAN'
    - 'rule-set:cncidr'
  



 

dns                       :
  enable: true                                                # 如果配置为关闭，则将仅仅使用系统 DNS
 #prefer-h3: true                                                # 设置：是否开启 DOH 的 http/3（加密DNS请求）
  ipv6: true                                             # 设置：是否启动 基于IPV6的DNS查询
  listen: '0.0.0.0:1053'  
 #listen: '0.0.0.0:53'                                   # 设置，如何拦截本地所有DNS请求 ： 方法 ，监听本地的53端口 ，如果此选项配置错误，则Clash 的DNS代理分流逻辑将不生效
  use-hosts: true                                                # 使用hosts # lookup hosts and return IP record
  use-system-hosts: true                                                # 
  skip-cert-verify: false                                               # TLS 握手时是否忽略证书验证    （ 如果设置为 true ，即，跳过证书验证，用来解决部分兼容性问题 ）
 
  default-nameserver:     # 仅用于，直连请求  的 域名解析
     
    - tls://223.5.5.5
    - tls://223.6.6.6 
  proxy-server-nameserver:     # 仅用于，代理节点  的 域名解析 
    - https://hrbgyitz34.cloudflare-gateway.com/dns-query
  direct-nameserver:   # 用于direct 出口域名解析的DNS服务器 的 域名解析
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:           # 注意⚠️ iOS（Stash） 对 DNS 数量非常敏感，不建议超过2个（否则会导致：网络内存占用上升超过50MB限制、iOS网络模块频繁崩溃）  ⚠️⚠️⚠️ 注意：follow-rule开启后，域名链接的DNS、DOH ，必须配合GlobalDNS分流策略  ⚠️⚠️⚠️
  - https://dns.adguard-dns.com/dns-query     # AdGuard          # 94.140.14.14        94.140.15.15
  - https://cloudflare-dns.com/dns-query 
    # Cloudflare DNS   # 1.1.1.1             1.0.0.1
  - https://dns.google/dns-query              # Google DNS       # 8.8.8.8             8.8.4.4
    
  #  - https://dns.quad9.net/dns-query           # IBM Quad9        # 9.9.9.11            149.112.112.11     
  #  - https://doh.opendns.com/dns-query         # OpenDNS          # 208.67.220.220      208.67.222.222
  #  - https://doh.dns.sb/dns-query              # DNS.SB           # 185.222.222.222     45.11.45.11

  #  - https://dns.twnic.tw/dns-query            # Quad101          # 101.101.101.10      101.102.103.10
  respect-rules: true                                             # Clash.meta 专属。默认为false ： DNS 查询请求，直接出站。ture ：DNS查询请求，经rule代理规则转发。 ⚠️⚠️⚠️  建议：使用IP配置节点的Server字段，而非域名，否则应配置 proxy-server-nameserver。详情请看：https://wiki.metacubex.one/config/dns/#_1 
  #follow-rule: true                                             # Stash      专属。默认为false ： DNS 查询请求，直接出站，ture ：DNS查询请求，经rule代理规则转发。 ⚠️⚠️⚠️  建议：使用IP配置节点的Server字段，而非域名，详情请看：https://stash.wiki/featrues/dns-server
                                                                             # 请注意：由于 Stash 没有 proxy-server-nameserver字段，所以，开启follow-rule 后，请保证如下规则： 转发 DNS 请求的代理地址为 IP 地址，而不是域名，或 DNS 服务器地址为 IP 地址，而不是域名
  
  enhanced-mode: fake-ip                                      # 可选值 fake-ip / redir-host ，默认 redir-host   （ ⚠️⚠️⚠️ 注意 ：Stash 3.0 不支持 redir-host ）
  fake-ip-range: '198.18.0.1/16'
  fake-ip-range6: fdfe:dcba:9876::1/64
  fake-ip-filter-mode: blacklist                                        # 默认 blacklist ：匹配命中的，立刻返回真实IP（不使用Fake IP）。 whitelist ：未匹配命中的默认直接返回真实IP（不使用Fake IP），匹配命中的财使用Fake IP。
  fake-ip-filter: ['rule-set:fakeip-filter_domain', 'rule-set:private']                                        # 设置：哪些域名 ，强制只使用 nameserver DNS 进行解析，并立刻返回真实IP ：这里配置为，任何域名，都不会被解析为 fake ip，所有解析请求将会返回它们真实的 IP 地址
 #fallback-filter:                                                  # 设置：哪些IP段 ，强制使用 fallback DNS 进行二次解析，



  # 哪些域名 使用 哪些DNS服务器，进行解析 （⚠️⚠️ 注意；如果 在非中国地区 使用本规则，建议注释掉本段，以便降低DNS泄漏风险https://raw.githubusercontent.com/Accademia/Additional_Rule_For_Clash/refs/heads/main/GeositeCN/GeositeCN_Domain.yaml
  nameserver-policy: 
    { 'geosite:cn': ['https://dns.alidns.com/dns-query', 'https://doh.pub/dns-query'] }  
                   # 仅Clash Meta支持，但 Stash 3.0 不支持！






